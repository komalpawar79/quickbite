version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: quickbite-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - quickbite-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quickbite-backend
    ports:
      - "5001:5001"
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/quickbite?authSource=admin
      JWT_SECRET: your_jwt_secret_key_here
      JWT_EXPIRE: 7d
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      NODE_ENV: production
      PORT: 5001
    depends_on:
      - mongodb
    networks:
      - quickbite-network
    restart: unless-stopped

  # Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quickbite-frontend
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: http://backend:5001/api
      REACT_APP_SOCKET_URL: http://backend:5001
    depends_on:
      - backend
    networks:
      - quickbite-network
    restart: unless-stopped

volumes:
  mongodb_data:

networks:
  quickbite-network:
    driver: bridge
